<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>

    {% load static %}

    <!-- Bootstrap -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'css/login.css' %}">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="login-wrapper">
    <div class="login-card shadow">

        <h2 class="text-center mb-4">Welcome Back</h2>

        <!-- 🔴 ACCOUNT LOCKED MESSAGE -->
        {% if locked %}
        <div class="alert alert-danger text-center">
            <strong>Account locked!</strong><br>
            Try again in
            <span id="timer">{{ remaining }}</span> seconds.
        </div>

        <script>
            let timeLeft = {{ remaining }};

            const timer = setInterval(() => {
                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;

                if (timeLeft <= 0) {
                    clearInterval(timer);
                    location.reload();
                }
            }, 1000);
        </script>
        {% endif %}

        <!-- 🔔 NORMAL MESSAGES -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- 🚫 Disable form when locked -->
        <form method="post" autocomplete="on" {% if locked %}style="pointer-events:none; opacity:0.6;"{% endif %}>
            {% csrf_token %}

            <!-- Username -->
            <div class="mb-3">
                <label class="form-label">Username</label>
                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-user"></i>
                    </span>

                    <input type="text" name="username" class="form-control"
                        placeholder="Enter username" required>
                </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
                <label class="form-label">Password</label>

                <div class="input-group">
                    <span class="input-group-text">
                        <i class="fas fa-lock"></i>
                    </span>

                    <input type="password" name="password" id="password"
                        class="form-control" placeholder="Enter password" required>

                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Login Button -->
            <button type="submit" class="btn btn-primary w-100">
                Login
            </button>

        </form>

        <!-- Links -->
        <div class="text-center mt-3">
            <p>
                Don't have an account?
                <a href="{% url 'auth:student_register' %}">Register</a>
            </p>
        </div>

        <div class="text-center mt-3">
            <p>
                Forgot Password?
                <a href="{% url 'auth:reset_password' %}">Reset Password</a>
            </p>
        </div>

    </div>
</div>

<!-- Scripts -->
<script>
function togglePassword() {
    const password = document.getElementById("password");
    password.type = password.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
